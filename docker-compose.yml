services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - postgres

    environment:
      PORT: 5000
      CHOKIDAR_USEPOLLING: "true"

      # Mongo
      MONGO_URL: mongodb://admin:admin123@mongo:27017/mydb?authSource=admin

      # Postgres (IMPORTANT: use service name "postgres")
      PG_USER: postgres
      PG_HOST: postgres
      PG_DATABASE: mydb
      PG_PASSWORD: 1234
      PG_PORT: 5432

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev

volumes:
  mongo_data:
  postgres_data:
  